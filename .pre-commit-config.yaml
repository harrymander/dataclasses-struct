repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.7
    hooks:
      - id: uv-lock
        args: ["--check"]
      - id: uv-export
        args: ["--quiet", "--only-group", "docs", "-o", "requirements-docs.txt"]
        files: ^(requirements-docs\.txt|pyproject\.toml|uv\.lock)$
